<script>
  const CSV_URL = "data.csv";
  const dataPeserta = {};

  function bersihkanNRP(value) {
    return String(value || "").trim().replace(/\.0$/, "");
  }

  function parseCSV(text) {
    const rows = [];
    let current = "";
    let row = [];
    let insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const char = text[i];
      const nextChar = text[i + 1];

      if (char === '"' && insideQuotes && nextChar === '"') {
        current += '"';
        i++;
      } else if (char === '"') {
        insideQuotes = !insideQuotes;
      } else if ((char === "," || char === ";") && !insideQuotes) {
        row.push(current.trim());
        current = "";
      } else if ((char === "\n" || char === "\r") && !insideQuotes) {
        if (current || row.length) {
          row.push(current.trim());
          rows.push(row);
          row = [];
          current = "";
        }
        if (char === "\r" && nextChar === "\n") i++;
      } else {
        current += char;
      }
    }

    if (current || row.length) {
      row.push(current.trim());
      rows.push(row);
    }

    return rows;
  }

  async function loadDataPeserta() {
    const status = document.getElementById("loadStatus");
    const button = document.getElementById("cekButton");

    button.disabled = true;
    button.textContent = "Memuat Data...";
    status.textContent = "Sedang memuat data peserta...";

    try {
      const response = await fetch(CSV_URL, { cache: "no-store" });

      if (!response.ok) {
        throw new Error("File data.csv tidak ditemukan. Pastikan data.csv sudah diupload sejajar dengan index.html.");
      }

      const csvText = await response.text();

      if (csvText.toLowerCase().includes("<html")) {
        throw new Error("Yang terbaca bukan CSV. Pastikan nama file benar: data.csv");
      }

      const rows = parseCSV(csvText).filter(function(row) {
        return row.some(function(cell) {
          return String(cell).trim() !== "";
        });
      });

      if (rows.length < 2) {
        throw new Error("data.csv kosong atau belum ada data peserta.");
      }

      const headers = rows[0].map(function(header) {
        return String(header || "").trim().toLowerCase();
      });

      rows.slice(1).forEach(function(row) {
        const item = {};

        headers.forEach(function(header, index) {
          item[header] = row[index] || "";
        });

        const nrp = bersihkanNRP(item.nrp);

        if (nrp) {
          dataPeserta[nrp] = {
            nama: item.nama || "Peserta",
            nrp: nrp
          };
        }
      });

      const total = Object.keys(dataPeserta).length;

      if (total === 0) {
        throw new Error("Kolom NRP tidak terbaca. Pastikan header CSV adalah Nama;NRP atau Nama,NRP.");
      }

      status.textContent = "Data berhasil dimuat. Total " + total + " peserta terdaftar.";
      status.style.color = "#bac3dc";
    } catch (error) {
      status.textContent = error.message;
      status.style.color = "#ffd9e7";
    } finally {
      button.disabled = false;
      button.textContent = "Cek Hasil Seleksi";
    }
  }

  function cekPengumuman() {
    const input = bersihkanNRP(document.getElementById("nrp").value);
    const peserta = dataPeserta[input];
    const error = document.getElementById("error");

    if (!input) {
      error.style.display = "block";
      error.textContent = "Masukkan NRP terlebih dahulu.";
      return;
    }

    if (!peserta) {
      error.style.display = "block";
      error.textContent = "NRP tidak ditemukan. Pastikan NRP yang dimasukkan sudah benar atau hubungi panitia.";
      return;
    }

    document.getElementById("namaPeserta").textContent = peserta.nama || "Peserta";
    document.getElementById("nrpPeserta").textContent = input;

    error.style.display = "none";
    document.getElementById("inputPage").style.display = "none";
    document.getElementById("resultPage").style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function kembali() {
    document.getElementById("resultPage").style.display = "none";
    document.getElementById("inputPage").style.display = "block";
    document.getElementById("nrp").value = "";
    document.getElementById("nrp").focus();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  document.getElementById("nrp").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      cekPengumuman();
    }
  });

  loadDataPeserta();
</script>
